<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg2)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.05)"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Icon -->
  <g transform="translate(180, 160)">
    <rect width="320" height="320" rx="70" ry="70" fill="#3B82F6"/>
    <circle cx="160" cy="145" r="90" fill="none" stroke="white" stroke-width="8" opacity="0.9"/>
    <line x1="160" y1="145" x2="160" y2="80" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <line x1="160" y1="145" x2="200" y2="110" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <circle cx="160" cy="145" r="6" fill="white"/>
    <text x="160" y="280" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="4">TICKER</text>
  </g>

  <!-- Text -->
  <text x="620" y="260" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="64" font-weight="700" fill="white">Your meetings,</text>
  <text x="620" y="340" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="64" font-weight="700" fill="#3B82F6">always in sight.</text>

  <text x="620" y="410" font-family="-apple-system, SF Pro Text, Helvetica Neue, sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">Native macOS menu bar calendar with live countdown</text>

  <!-- Tags -->
  <rect x="620" y="440" width="100" height="32" rx="16" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="1"/>
  <text x="670" y="461" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#60A5FA">SwiftUI</text>

  <rect x="735" y="440" width="80" height="32" rx="16" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="1"/>
  <text x="775" y="461" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#60A5FA">macOS</text>

  <rect x="830" y="440" width="130" height="32" rx="16" fill="rgba(59,130,246,0.2)" stroke="#3B82F6" stroke-width="1"/>
  <text x="895" y="461" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#60A5FA">Open Source</text>
</svg>
