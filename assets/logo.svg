<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" ry="110" fill="url(#shine)"/>

  <!-- Clock face -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="white" stroke-width="12" opacity="0.9"/>

  <!-- Hour marks -->
  <line x1="256" y1="112" x2="256" y2="130" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="350" x2="256" y2="368" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="128" y1="240" x2="146" y2="240" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="366" y1="240" x2="384" y2="240" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.7"/>

  <!-- Minute hand -->
  <line x1="256" y1="240" x2="256" y2="140" stroke="white" stroke-width="10" stroke-linecap="round"/>

  <!-- Hour hand -->
  <line x1="256" y1="240" x2="310" y2="190" stroke="white" stroke-width="12" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="256" cy="240" r="10" fill="white"/>

  <!-- Ticker text -->
  <text x="256" y="435" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue, sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="6">TICKER</text>
</svg>
