name: Ticker
options:
  bundleIdPrefix: com.rajdeepgupta
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

targets:
  Ticker:
    type: application
    platform: macOS
    sources:
      - Ticker
    info:
      path: Ticker/Info.plist
      properties:
        LSUIElement: true
        NSCalendarsFullAccessUsageDescription: "Ticker needs access to your calendars to display upcoming meetings."
        CFBundleDisplayName: Ticker
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        GoogleClientID: "$(GOOGLE_CLIENT_ID)"
        GoogleClientSecret: "$(GOOGLE_CLIENT_SECRET)"
    entitlements:
      path: Ticker/Ticker.entitlements
    configFiles:
      Debug: Ticker/Config.xcconfig
      Release: Ticker/Config.xcconfig
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.rajdeepgupta.Ticker
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSUIElement: true
        GENERATE_INFOPLIST_FILE: true
